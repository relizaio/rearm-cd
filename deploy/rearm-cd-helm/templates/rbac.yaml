apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/name: {{ .Release.Namespace }}-{{ .Release.Name }}-rearm-cd
    app.kubernetes.io/part-of: {{ .Release.Namespace }}-{{ .Release.Name }}-rearm-cd
  name: {{ .Release.Namespace }}-{{ .Release.Name }}-rearm-cd
  namespace: {{ .Release.Namespace }}

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: {{ .Release.Namespace }}-{{ .Release.Name }}-rearm-cd
  name: {{ .Release.Namespace }}-{{ .Release.Name }}-rearm-cd
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Namespace }}-{{ .Release.Name }}-rearm-cd
subjects:
- kind: ServiceAccount
  name: {{ .Release.Namespace }}-{{ .Release.Name }}-rearm-cd
  namespace: {{ .Release.Namespace }}
  apiGroup: ""
roleRef:
  kind: ClusterRole
  name: {{ .Release.Namespace }}-{{ .Release.Name }}-rearm-cd
  apiGroup: ""