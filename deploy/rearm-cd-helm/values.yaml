mode: STANDALONE # options: STANDALONE, EXISTING_ARGO, NEW_ARGO
imagePullPolicy: IfNotPresent
images:
  rearmcdImage: registry.relizahub.com/library/rearm-cd-app:26.03.8@sha256:bcbc97b0eab3b05fca2a86061e28e97ca93ebcd80b0b5f5b34dddb945bf7d0c6

enableWatcher: true
backup:
  enabled: false
  schedule: "0 2 * * *" # cron schedule for backup, default is 2 AM daily
