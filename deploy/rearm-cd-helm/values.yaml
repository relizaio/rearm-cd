mode: STANDALONE # options: STANDALONE, EXISTING_ARGO, NEW_ARGO
imagePullPolicy: IfNotPresent
images:
  rearmcdImage: registry.relizahub.com/library/rearm-cd-app:26.03.24@sha256:8f9861fa7086631a32dbd1d98a08e3a13864b137238207dcfcac56d3403c4c1a

enableWatcher: true
watcherHelmVersion: "0.1.16"
watcherHelmChart: "oci://registry.relizahub.com/library/rearm-watcher"
backup:
  enabled: false
  schedule: "0 2 * * *" # cron schedule for backup, default is 2 AM daily
  awsRegion: "ca-central-1"
  prefix: "rearm-cd-backup"

rbac:
  createServiceAccount: true
  createClusterRole: true
  createClusterRoleBinding: true
  # Override the service account name. When empty, defaults to <namespace>-<release>-rearm-cd.
  # Set this to a pre-existing service account name when createServiceAccount is false.
  serviceAccountName: ""
  # To restrict ReARM CD to specific namespaces instead of cluster-wide access,
  # list them here. When set, namespace-scoped Roles and RoleBindings are created
  # instead of ClusterRole/ClusterRoleBinding.
  # namespaces: []
  # Example:
  # namespaces:
  #   - default
  #   - staging
  #   - production

storageSize: 1G

create_secret_in_chart: none # regular, none
rearmUri: https://demo.rearmhq.com
rearmApiId: placeholder # instance api id
rearmApiKey: placeholder # instance api key
argoHelmVersion: 6.6.0
