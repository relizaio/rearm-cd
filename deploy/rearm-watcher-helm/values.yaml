# Default values for rearm-watcher.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

enabled: true

replicaCount: 1

image:
  repository: registry.relizahub.com/library/rearm-watcher-app:26.03.12@sha256:580115753b96ddfc32d541688fbb864c36f8a6d638cb441af7d4b170b1c76028
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

