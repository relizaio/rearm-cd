# Default values for rearm-watcher.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

enabled: true

replicaCount: 1

image:
  repository: registry.relizahub.com/library/rearm-watcher-app:26.03.11@sha256:94cbb18338d9de6b58a335a44b02ac62365c15ceffad92d82503d56b519be30d
  pullPolicy: IfNotPresent

nameOverride: ""
