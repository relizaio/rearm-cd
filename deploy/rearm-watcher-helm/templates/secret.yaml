{{- if .Values.enabled}}
{{- if eq .Values.create_secret_in_chart "regular"}}
apiVersion: v1
kind: Secret
metadata:
  name: rearm-watcher
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  rearm-api-id: {{ .Values.rearmApiId | b64enc | quote }}
  rearm-api-key: {{ .Values.rearmApiKey | b64enc | quote }}
---
{{- else if eq .Values.create_secret_in_chart "sealed"}}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: rearm-watcher
  namespace: {{ .Release.Namespace }}
  {{- if eq .Values.sealed_secrets_scope "namespace-wide"}}
  annotations:
    sealedsecrets.bitnami.com/namespace-wide: "true"
  {{- else if eq .Values.sealed_secrets_scope "cluster-wide"}}
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "true"
  {{- end }}
spec:
  encryptedData:
    rearm-api-id: {{ .Values.rearmApiId | quote }}
    rearm-api-key: {{ .Values.rearmApiKey | quote }}
---
{{- end}}
{{- end }}