# This file grants the ReARM CD service account read-only access to the
# sealed-secrets-controller service in kube-system. This is required for
# kubeseal --fetch-cert to work when using namespace-scoped RBAC.
#
# Apply this once before or after installing the ReARM CD Helm chart:
#   kubectl apply -f sealed-secrets-rbac.yaml
#
# Adjust the service account name and namespace below to match your installation.
# Default service account name is: <namespace>-<release>-rearm-cd
# For example: rearm-cd-rearm-cd-rearm-cd (namespace=rearm-cd, release=rearm-cd)
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app.kubernetes.io/name: rearm-cd-sealed-secrets
  name: rearm-cd-sealed-secrets
  namespace: kube-system
rules:
- apiGroups: [""]
  resources: ["services"]
  resourceNames: ["sealed-secrets-controller"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["sealed-secrets-key"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rearm-cd-sealed-secrets
  namespace: kube-system
subjects:
- kind: ServiceAccount
  name: rearm-cd-rearm-cd-rearm-cd  # adjust to match your ReARM CD service account name (change if not default)
  namespace: rearm-cd                # adjust to match your ReARM CD namespace
  apiGroup: ""
roleRef:
  kind: Role
  name: rearm-cd-sealed-secrets
  apiGroup: rbac.authorization.k8s.io
